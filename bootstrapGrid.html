<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid in Bootsrap</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      h3 {
        text-align: center;
        margin: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container text-center" style="background-color: aqua">
      <div class="row">
        <div class="col">column</div>
        <div class="col">column</div>
        <div class="col">column</div>
      </div>
    </div>

    <h3>Equal width in Bootsrap</h3>

    <div class="conterner text-center" style="background-color: aquamarine">
      <div class="row">
        <div class="col" style="background-color: blue">1 of 2</div>
        <div class="col" style="background-color: yellow">2 of 2</div>
      </div>
    </div>

    <div class="container text-center" style="margin-top: 20px">
      <div class="row">
        <div class="col" style="background-color: red">1 of 1</div>
        <div class="col" style="background-color: orange">1 of 2</div>
        <div class="col" style="background-color: orangered">1 of 3</div>
      </div>
    </div>

    <h3>Setting one column width</h3>
    <div class="container">
      <div class="row">
        <div class="col" style="background-color: pink">1 of 1</div>
        <div class="col-6" style="background-color: purple">1 of 2 (wider)</div>
        <div class="col" style="background-color: plum">1 of 3</div>
      </div>
    </div>

    <h3>Nesting</h3>
    <div class="container text-center" style="background-color: yellowgreen">
      <div class="row">
        <div class="col-sm-3">Level 1: .col-sm-3</div>
        <div class="col-sm-9" style="background-color: bisque">
          <div class="row">
            <div class="col-8 col-sm-6">Level 2: .col-8 .col-sm-6</div>
            <div class="col-4 col-sm-6">Level 2: .col-4 .col-sm-6</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
